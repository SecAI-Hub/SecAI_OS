# Upstream dependency manifest for SecAI OS.
#
# Each entry pins an external repository to a specific commit + archive checksum.
# Subtree source lives in upstreams/<name>/ (NOT vendor/).
#
# CI on PRs to main/release branches FAILS if any entry has status: PENDING.
# Placeholder entries are only allowed on migration branches.
#
# To update an upstream: scripts/update-upstream.sh <name> <new-sha>

schema_version: 1

upstreams:
  ai-model-registry:
    upstream_url: https://github.com/SecAI-Hub/ai-model-registry.git
    pinned_commit: "# PENDING: awaiting subtree import"
    archive_sha256: "# PENDING"
    local_path: upstreams/ai-model-registry
    license: Apache-2.0
    sync_date: null
    reviewer: null

