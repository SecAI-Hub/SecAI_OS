<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>SecAI OS - Login</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1b26;
            --surface-hover: #1e2030;
            --border: #2a2b3d;
            --text: #c0caf5;
            --text-secondary: #a9b1d6;
            --text-muted: #565f89;
            --accent: #7aa2f7;
            --accent-hover: #89b4fa;
            --danger: #f7768e;
            --success: #9ece6a;
            --radius: 8px;
            --radius-lg: 12px;
            --transition: 0.15s ease;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 1rem;
        }
        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }
        .login-brand svg { width: 32px; height: 32px; color: var(--accent); }
        .login-brand span { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.5px; }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
        }
        .login-card h1 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
        }
        .login-card .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }
        .form-group { margin-bottom: 1rem; }
        .form-label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.375rem;
        }
        .form-input {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            color: var(--text);
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color var(--transition);
        }
        .form-input:focus { outline: none; border-color: var(--accent); }
        .form-input::placeholder { color: var(--text-muted); }
        .btn-primary {
            width: 100%;
            padding: 0.65rem;
            border-radius: var(--radius);
            border: none;
            background: var(--accent);
            color: var(--bg);
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background var(--transition);
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
        .error-msg {
            background: rgba(247, 118, 142, 0.1);
            color: var(--danger);
            border: 1px solid rgba(247, 118, 142, 0.2);
            padding: 0.6rem 0.75rem;
            border-radius: var(--radius);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
        .confirm-group { display: none; }
        .confirm-group.visible { display: block; }
        .setup-note {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 1.25rem;
            text-align: center;
            line-height: 1.5;
        }
        .security-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .security-footer svg { width: 14px; height: 14px; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span>SecAI OS</span>
        </div>

        <div class="login-card">
            <h1 id="title">Unlock Appliance</h1>
            <p class="subtitle" id="subtitle">Enter your passphrase to continue.</p>

            <div class="error-msg" id="error-msg"></div>

            <form id="auth-form" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label class="form-label" for="passphrase">Passphrase</label>
                    <input class="form-input" type="password" id="passphrase" name="passphrase"
                           placeholder="Enter passphrase" autofocus required minlength="8" maxlength="256">
                </div>

                <div class="confirm-group" id="confirm-group">
                    <div class="form-group">
                        <label class="form-label" for="confirm">Confirm Passphrase</label>
                        <input class="form-input" type="password" id="confirm" name="confirm"
                               placeholder="Confirm passphrase" minlength="8" maxlength="256">
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="submit-btn">Unlock</button>
            </form>

            <div class="setup-note" id="setup-note" style="display: none;">
                Choose a passphrase (minimum 8 characters) to protect this appliance.
            </div>
        </div>

        <div class="security-footer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            All data stays on this device
        </div>
    </div>

    <script>
        var isSetup = false;

        async function checkSetup() {
            try {
                var resp = await fetch('/api/auth/status');
                var data = await resp.json();
                if (!data.configured) {
                    isSetup = true;
                    document.getElementById('title').textContent = 'Set Up Passphrase';
                    document.getElementById('subtitle').textContent = 'Protect your Secure AI Appliance with a strong passphrase.';
                    document.getElementById('confirm-group').classList.add('visible');
                    document.getElementById('submit-btn').textContent = 'Set Passphrase';
                    document.getElementById('setup-note').style.display = 'block';
                }
            } catch(e) {}
        }

        function showError(msg) {
            var el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
        }
        function hideError() {
            document.getElementById('error-msg').style.display = 'none';
        }

        async function handleSubmit(e) {
            e.preventDefault();
            hideError();

            var passphrase = document.getElementById('passphrase').value;
            var btn = document.getElementById('submit-btn');

            if (isSetup) {
                var confirmVal = document.getElementById('confirm').value;
                if (passphrase !== confirmVal) {
                    showError('Passphrases do not match.');
                    return;
                }
                if (passphrase.length < 8) {
                    showError('Passphrase must be at least 8 characters.');
                    return;
                }

                btn.disabled = true;
                btn.textContent = 'Setting up...';

                try {
                    var resp = await fetch('/api/auth/setup', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({passphrase: passphrase}),
                    });
                    var data = await resp.json();
                    if (data.success) {
                        await doLogin(passphrase);
                    } else {
                        showError(data.error || 'Setup failed.');
                    }
                } catch(e) {
                    showError('Could not connect to server.');
                }
                btn.disabled = false;
                btn.textContent = 'Set Passphrase';
            } else {
                btn.disabled = true;
                btn.textContent = 'Unlocking...';
                await doLogin(passphrase);
                btn.disabled = false;
                btn.textContent = 'Unlock';
            }
        }

        async function doLogin(passphrase) {
            try {
                var resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({passphrase: passphrase}),
                });
                var data = await resp.json();
                if (data.success) {
                    window.location.href = '/';
                } else {
                    showError(data.error || 'Login failed.');
                }
            } catch(e) {
                showError('Could not connect to server.');
            }
        }

        checkSetup();
    </script>
</body>
</html>
