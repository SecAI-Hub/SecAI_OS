<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure AI - Settings</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1b26;
            --border: #2a2b3d;
            --text: #c0caf5;
            --text-dim: #565f89;
            --accent: #7aa2f7;
            --accent-hover: #89b4fa;
            --danger: #f7768e;
            --success: #9ece6a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { font-size: 1.1rem; font-weight: 600; }
        header nav a {
            color: var(--accent);
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.9rem;
        }
        header nav a:hover { color: var(--accent-hover); }
        .container { max-width: 600px; margin: 0 auto; padding: 1.5rem; }
        .section { margin-bottom: 2rem; }
        .section h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.25rem;
        }
        label {
            font-size: 0.85rem;
            color: var(--text-dim);
            display: block;
            margin-bottom: 0.3rem;
        }
        input[type="password"] {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.4rem;
            background: var(--bg);
            color: var(--text);
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
        }
        input:focus { outline: none; border-color: var(--accent); }
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 0.4rem;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
        }
        .btn:hover { border-color: var(--accent); }
        .btn-primary {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
            font-weight: 600;
        }
        .btn-danger { color: var(--danger); }
        .btn-danger:hover { border-color: var(--danger); }
        .msg {
            padding: 0.5rem 0.75rem;
            border-radius: 0.4rem;
            font-size: 0.85rem;
            margin-bottom: 0.75rem;
            display: none;
        }
        .msg.success { display: block; background: #1a2e1a; color: var(--success); border: 1px solid #2d4a2d; }
        .msg.error { display: block; background: #2e1a1a; color: var(--danger); border: 1px solid #4a2d2d; }
        .session-info {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-top: 0.75rem;
        }
        .actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    </style>
</head>
<body>
    <header>
        <h1>Settings</h1>
        <nav>
            <a href="/">Chat</a>
            <a href="/models">Models</a>
            <a href="/generate">Generate</a>
            <a href="/settings">Settings</a>
        </nav>
    </header>

    <div class="container">
        <div class="section">
            <h2>Vault</h2>
            <div class="card">
                <div id="vault-info" class="session-info">Loading vault status...</div>
                <div class="actions" id="vault-actions"></div>
            </div>
        </div>

        <div class="section">
            <h2>Session</h2>
            <div class="card">
                <div id="session-info" class="session-info">Loading...</div>
                <div class="actions">
                    <button class="btn btn-danger" onclick="logout()">Log Out</button>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>Change Passphrase</h2>
            <div class="card">
                <div class="msg" id="change-msg"></div>
                <form onsubmit="changePassphrase(event)">
                    <label for="current">Current Passphrase</label>
                    <input type="password" id="current" required>

                    <label for="new-pass">New Passphrase</label>
                    <input type="password" id="new-pass" required minlength="8">

                    <label for="confirm-pass">Confirm New Passphrase</label>
                    <input type="password" id="confirm-pass" required minlength="8">

                    <button type="submit" class="btn btn-primary">Change Passphrase</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        async function loadSession() {
            try {
                const resp = await fetch("/api/auth/status");
                const data = await resp.json();
                const info = document.getElementById("session-info");
                if (data.session && data.session.active) {
                    const age = Math.floor(data.session.age_seconds / 60);
                    const idle = Math.floor(data.session.idle_seconds / 60);
                    const timeout = Math.floor(data.session.timeout / 60);
                    info.textContent = `Session active for ${age} min. Idle: ${idle} min. Auto-lock after ${timeout} min inactivity.`;
                } else {
                    info.textContent = "No active session.";
                }
            } catch {
                document.getElementById("session-info").textContent = "Could not load session info.";
            }
        }

        async function logout() {
            await fetch("/api/auth/logout", { method: "POST" });
            window.location.href = "/login";
        }

        async function changePassphrase(e) {
            e.preventDefault();
            const msg = document.getElementById("change-msg");
            msg.className = "msg";

            const newPass = document.getElementById("new-pass").value;
            const confirm = document.getElementById("confirm-pass").value;
            if (newPass !== confirm) {
                msg.textContent = "New passphrases do not match.";
                msg.className = "msg error";
                return;
            }

            try {
                const resp = await fetch("/api/auth/change", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        current: document.getElementById("current").value,
                        new_passphrase: newPass,
                    }),
                });
                const data = await resp.json();
                if (data.success) {
                    msg.textContent = "Passphrase changed. All other sessions invalidated.";
                    msg.className = "msg success";
                    document.getElementById("current").value = "";
                    document.getElementById("new-pass").value = "";
                    document.getElementById("confirm-pass").value = "";
                } else {
                    msg.textContent = data.error || "Change failed.";
                    msg.className = "msg error";
                }
            } catch {
                msg.textContent = "Could not connect to server.";
                msg.className = "msg error";
            }
        }

        async function loadVault() {
            const info = document.getElementById("vault-info");
            const actions = document.getElementById("vault-actions");
            try {
                const resp = await fetch("/api/vault/status");
                const data = await resp.json();
                const s = data.state;
                if (s === "unlocked") {
                    const idle = Math.floor((data.idle_seconds || 0) / 60);
                    info.textContent = `Vault is unlocked. Idle: ${idle} min.`;
                    info.style.color = "var(--success)";
                    actions.innerHTML = '<button class="btn btn-danger" onclick="lockVault()">Lock Vault Now</button>';
                } else if (s === "locking_soon") {
                    info.textContent = "Vault will lock soon due to inactivity.";
                    info.style.color = "#e0af68";
                    actions.innerHTML = '<button class="btn" onclick="keepalive()">Stay Unlocked</button> <button class="btn btn-danger" onclick="lockVault()">Lock Now</button>';
                } else if (s === "locked") {
                    info.textContent = "Vault is locked. Enter the LUKS passphrase to unlock.";
                    info.style.color = "var(--danger)";
                    actions.innerHTML = '<input type="password" id="vault-pass" placeholder="LUKS passphrase" style="width:auto;margin:0;margin-right:0.5rem;"> <button class="btn btn-primary" onclick="unlockVault()">Unlock</button>';
                } else {
                    info.textContent = "Vault status unknown.";
                    info.style.color = "var(--text-dim)";
                    actions.innerHTML = "";
                }
            } catch {
                info.textContent = "Could not check vault status.";
                info.style.color = "var(--text-dim)";
            }
        }

        async function lockVault() {
            if (!confirm("Lock the vault? This will stop all AI services.")) return;
            try {
                const resp = await fetch("/api/vault/lock", { method: "POST" });
                const data = await resp.json();
                if (data.success) loadVault();
                else alert(data.error || "Lock failed.");
            } catch { alert("Could not connect to server."); }
        }

        async function unlockVault() {
            const pass = document.getElementById("vault-pass").value;
            if (!pass) return;
            try {
                const resp = await fetch("/api/vault/unlock", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({passphrase: pass}),
                });
                const data = await resp.json();
                if (data.success) loadVault();
                else alert(data.error || "Unlock failed.");
            } catch { alert("Could not connect to server."); }
        }

        async function keepalive() {
            await fetch("/api/vault/keepalive", { method: "POST" });
            loadVault();
        }

        loadSession();
        loadVault();
        setInterval(loadVault, 10000);
    </script>
</body>
</html>
