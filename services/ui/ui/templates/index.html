<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure AI Appliance</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1b26;
            --border: #2a2b3d;
            --text: #c0caf5;
            --text-dim: #565f89;
            --accent: #7aa2f7;
            --accent-hover: #89b4fa;
            --user-bg: #1e2030;
            --ai-bg: #16161e;
            --danger: #f7768e;
            --success: #9ece6a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            font-size: 1.1rem;
            font-weight: 600;
        }
        #status-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--border);
        }
        #status-badge.online { border-color: var(--success); color: var(--success); }
        #status-badge.offline { border-color: var(--danger); color: var(--danger); }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            max-width: 75%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: var(--user-bg);
            border: 1px solid var(--border);
        }
        .message.assistant {
            align-self: flex-start;
            background: var(--ai-bg);
            border: 1px solid var(--border);
        }
        #input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.75rem;
        }
        #input-area textarea {
            flex: 1;
            resize: none;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            min-height: 2.5rem;
            max-height: 10rem;
        }
        #input-area textarea:focus { border-color: var(--accent); }
        #input-area button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 0.5rem;
            padding: 0 1.25rem;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
        }
        #input-area button:hover { background: var(--accent-hover); }
        #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Secure AI Appliance</h1>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <a href="/models" style="color: var(--accent); text-decoration: none; font-size: 0.9rem;">Models</a>
            <span id="status-badge" class="offline">checking...</span>
        </div>
    </header>

    <div id="chat-container">
        <div class="empty-state" id="empty-state">
            Local-first. Private by default.
        </div>
    </div>

    <div id="input-area">
        <textarea id="user-input" rows="1" placeholder="Type a message..." autofocus></textarea>
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById("chat-container");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");
        const emptyState = document.getElementById("empty-state");
        const statusBadge = document.getElementById("status-badge");

        let messages = [];

        userInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        userInput.addEventListener("input", () => {
            userInput.style.height = "auto";
            userInput.style.height = Math.min(userInput.scrollHeight, 160) + "px";
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            if (emptyState) emptyState.remove();

            appendMessage("user", text);
            messages.push({ role: "user", content: text });
            userInput.value = "";
            userInput.style.height = "auto";
            sendBtn.disabled = true;

            try {
                const resp = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ messages }),
                });
                const data = await resp.json();

                if (data.error) {
                    appendMessage("assistant", "Error: " + data.error);
                } else {
                    const content = data.choices?.[0]?.message?.content || "No response";
                    appendMessage("assistant", content);
                    messages.push({ role: "assistant", content });
                }
            } catch (err) {
                appendMessage("assistant", "Error: could not reach inference worker");
            }

            sendBtn.disabled = false;
            userInput.focus();
        }

        function appendMessage(role, content) {
            const div = document.createElement("div");
            div.className = "message " + role;
            div.textContent = content;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function checkStatus() {
            try {
                const resp = await fetch("/api/status");
                const data = await resp.json();
                const inferUp = data.services?.inference?.status === "ok";
                statusBadge.textContent = inferUp ? "local-only" : "no model loaded";
                statusBadge.className = inferUp ? "online" : "offline";
            } catch {
                statusBadge.textContent = "offline";
                statusBadge.className = "offline";
            }
        }

        checkStatus();
        setInterval(checkStatus, 15000);
    </script>
</body>
</html>
