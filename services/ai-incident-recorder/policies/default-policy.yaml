version: 1

recorder:
  data_dir: /var/lib/secure-ai/incidents

  # Event retention limits
  retention:
    max_events_per_session: 10000
    max_sessions: 1000
    expire_after_days: 90

  # PII/credential redaction
  redaction:
    # Redact when packaging case bundles (recommended: true)
    on_package: true
    # Redact at recording time (privacy-first mode; loses raw evidence)
    on_record: false
    # Which patterns to apply (empty = all)
    patterns:
      - ssn
      - email
      - credential
      - bearer_token
      - credit_card

  # Named privacy profiles for case bundles.
  # Use --profile or ?profile= to select one; otherwise the default
  # redaction config above is used.
  privacy_profiles:
    internal:
      redact: true
      strip_hostname: false
      patterns:
        - ssn
        - credit_card
    external-share:
      redact: true
      strip_hostname: true
      patterns:
        - ssn
        - email
        - credential
        - bearer_token
        - credit_card
    legal-review:
      redact: true
      strip_hostname: true
      patterns:
        - ssn
        - email
        - credential
        - bearer_token
        - credit_card

  # Signing key for case bundles
  signing_key: /etc/secure-ai/keys/recorder.key

  # Daemon mode settings
  daemon:
    bind_addr: "127.0.0.1:8495"
    read_timeout_seconds: 30
    write_timeout_seconds: 60

  # Rate limiting for daemon API
  rate_limit:
    requests_per_minute: 120
