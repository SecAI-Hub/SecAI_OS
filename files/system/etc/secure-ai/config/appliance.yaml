version: 1

appliance:
  name: "Secure AI Appliance"
  mode: "local-only"  # local-only | online-augmented

paths:
  vault: "/var/lib/secure-ai/vault"
  registry: "/var/lib/secure-ai/registry"
  quarantine: "/var/lib/secure-ai/quarantine"
  airlock_audit: "/var/lib/secure-ai/airlock-audit"
  tmpdir: "/run/secure-ai/tmp"
  outputs: "/var/lib/secure-ai/vault/outputs"

gpu:
  # Auto-detected at first boot by detect-gpu.sh. Override here if needed.
  # backend: auto | cuda | rocm | xpu | vulkan | mps | cpu
  backend: "auto"

vm:
  # VM-specific settings (auto-detected by detect-vm.sh at first boot)
  # gpu_passthrough: allow GPU acceleration in VMs (disabled by default for security)
  # When disabled, inference and diffusion run on CPU only — safer but slower.
  # When enabled, GPU memory is accessible to the host hypervisor.
  gpu_passthrough: false

inference:
  engine: "llama-cpp"
  bind: "127.0.0.1:8465"
  gpu_layers: -1  # -1 = offload all layers to GPU; 0 = CPU only
  context_size: 8192
  default_model: ""  # set after first model is promoted

diffusion:
  bind: "127.0.0.1:8455"
  max_resolution: 2048
  max_steps: 100
  max_frames: 120

services:
  registry:
    bind: "127.0.0.1:8470"
  tool_firewall:
    bind: "127.0.0.1:8475"
  agent:
    bind: "127.0.0.1:8476"
  ui:
    bind: "127.0.0.1:8480"
  airlock:
    bind: "127.0.0.1:8490"
  diffusion:
    bind: "127.0.0.1:8455"
  search_mediator:
    bind: "127.0.0.1:8485"
  searxng:
    bind: "127.0.0.1:8888"
  tor:
    socks: "127.0.0.1:9050"

# Agent mode configuration (spec: SecAI_OS Agent Mode Specification)
# The agent is a supervised local autopilot — not an autonomous agent.
# It automates bounded local workflows and treats every online action
# as a policy-gated exception routed through the airlock.
agent:
  # Whether agent mode is available (default: true, per spec §1)
  enabled: true
  # Default operating mode: offline_only | standard | online_assisted | sensitive
  default_mode: "standard"
  # Policy file for agent-specific rules
  policy_path: "/etc/secure-ai/policy/agent.yaml"

traffic_analysis_protection:
  # Network traffic analysis countermeasures (M19).
  # Query timing randomization: random 0.5–3s delay before each search.
  # Query padding: pad queries to fixed-size buckets (256/512/1024 bytes).
  # Tor circuit rotation: MaxCircuitDirtiness 30s for faster circuit changes.
  # Tor padding: ConnectionPadding enabled to add dummy cells.
  # DNS leak detection: periodic check every 60 min (timer).
  query_delay_min: 0.5
  query_delay_max: 3.0
  query_pad_buckets: [256, 512, 1024]
  tor_max_circuit_dirtiness: 30
  tor_connection_padding: true
  dns_leak_check_interval: 60  # minutes

session:
  mode: "normal"  # normal | sensitive | offline-only
  # sensitive mode: aggressive worker recycling after each task
  # offline-only: hard-block all network even if airlock is enabled

monitoring:
  # Model integrity check interval (minutes). The integrity timer verifies
  # SHA256 hashes of all promoted models against the registry manifest.
  # On mismatch: model is quarantined, removed from manifest, workers restarted.
  integrity_interval: 15  # minutes (5, 15, 30, or 60)

  # Audit log chain verification interval (minutes). Walks every hash-chained
  # audit log and verifies the chain is intact. On break: snapshots the broken
  # log and raises a CRITICAL alert.
  audit_interval: 30  # minutes

vault:
  # Auto-lock timeout in minutes. After this period of inactivity the vault
  # is automatically locked (unmounted + LUKS closed), stopping all AI services.
  # Set to 0 to disable auto-lock (not recommended).
  auto_lock_timeout: 30
  # How often the watchdog checks for inactivity (seconds).
  check_interval: 30

auth:
  # Session timeout in minutes. After this period of inactivity the user
  # must re-authenticate. Setting to 0 disables timeout (not recommended).
  session_timeout: 30
  # Maximum failed login attempts before lockout.
  max_failed_attempts: 5
  # Initial lockout duration in seconds after max_failed_attempts.
  lockout_duration: 60
  # Escalated lockout after 15 failed attempts (seconds).
  escalated_lockout: 900

secure_boot:
  # UEFI Secure Boot + TPM2 measured boot (M17).
  # MOK (Machine Owner Key) signs bootloader and kernel.
  # TPM2 seals the LUKS vault key to PCR values (firmware, kernel, bootloader,
  # secure boot state). If the boot chain is tampered, TPM refuses to unseal
  # and the user must enter the passphrase manually.
  # PCR binding: PCR 0 (firmware), 2 (option ROM), 4 (bootloader), 7 (SB state).
  tpm2_pcr_binding: "sha256:0,2,4,7"
  # Allow passphrase fallback when PCR mismatch (e.g., after legitimate update).
  passphrase_fallback: true
  # Auto-reseal after rpm-ostree upgrade (requires user passphrase confirmation).
  auto_reseal_on_update: false

sandbox:
  # Per-service process isolation (M16).
  # seccomp: JSON profiles in /etc/secure-ai/seccomp/ define allowed syscalls.
  # landlock: YAML policy in /etc/secure-ai/policy/landlock.yaml restricts filesystem access.
  # Both are enabled by default. If Landlock is unavailable (kernel < 5.13),
  # enforcement is skipped with a warning.
  seccomp_enabled: true
  landlock_enabled: true
  # Core dump prevention across all services (LimitCORE=0).
  core_dumps_disabled: true

memory_protection:
  # Memory protection hardening (M18).
  # Prevents secrets (vault keys, inference context) from leaking to disk.
  # vm.swappiness=0: kernel avoids swapping (belt-and-suspenders with systemd.swap=0)
  # zswap.enabled=0: no compressed swap in RAM (karg)
  # core_pattern=|/bin/false: discard all core dumps
  # mlock: sensitive buffers locked in RAM via SecureBuffer class
  # TEE detection: AMD SEV / Intel TDX / TME checked at first boot
  swap_disabled: true
  zswap_disabled: true
  core_dumps_disabled: true
  mlock_sensitive_data: true
  tee_detection: true

clipboard:
  # Clipboard isolation (M21).
  # VM clipboard agents (spice-vdagent, vmware-user, VBoxClient) are detected
  # and disabled at first boot. Non-UI services get PrivateUsers=yes to prevent
  # clipboard access. Clipboard is auto-cleared every 60 seconds.
  isolate_vm_clipboard: true
  auto_clear_enabled: true
  auto_clear_interval: 60  # seconds
  private_users_non_ui: true

canary:
  # Canary / tripwire system (M22).
  # Places canary files in sensitive directories and monitors them for tampering.
  # Timer checks every 5 minutes; inotify watcher provides real-time detection.
  # On tripwire: locks vault, kills workers, writes CRITICAL audit entry.
  check_interval: 5  # minutes
  inotify_enabled: true
  locations:
    - "/var/lib/secure-ai/vault/.canary"
    - "/var/lib/secure-ai/registry/.canary"
    - "/var/lib/secure-ai/keys/.canary"
    - "/etc/secure-ai/.canary"

emergency:
  # Emergency wipe / panic system (M23).
  # Three severity levels:
  #   Level 1 — Lock: stop services, lock vault, invalidate sessions (reversible)
  #   Level 2 — Wipe Keys: shred LUKS header, cosign keys, TPM2 keys, MOK key
  #   Level 3 — Full Wipe: re-encrypt vault with random key (data unrecoverable),
  #             clear memory, delete logs, registry, auth data
  # Levels 2+ require passphrase confirmation.
  # Countdown gives 5 seconds to cancel (skippable with --no-countdown).
  countdown_seconds: 5
  require_passphrase_level2: true
  audit_log: "/var/lib/secure-ai/logs/panic-audit.jsonl"

updates:
  # Update verification + auto-rollback (M24).
  # Cosign signature verification before applying rpm-ostree upgrades.
  # Staged updates: check → stage → apply workflow via UI.
  # Greenboot health checks: auto-rollback if post-update boot fails.
  # Max 2 rollback attempts before halting for manual intervention.
  cosign_verify: true
  auto_check_interval: 6  # hours
  max_rollback_attempts: 2
  health_check_timeout: 300  # seconds
  staged_updates: true  # require explicit user confirmation before applying

logging:
  level: "info"
  store_raw_prompts: false
  store_raw_responses: false
  audit_tool_calls: true

# ---------------------------------------------------------------------------
# Runtime profiles — control which optional services are active and the
# network/agent posture.  Profile DEFINITIONS are baked into the image
# (immutable).  The active selection lives in the writable runtime state
# at /var/lib/secure-ai/state/profile.json (root:root 0644, atomic writes).
#
# An operator can hard-lock the profile by placing a file at
# /etc/secure-ai/local.d/profile.yaml — when present it overrides the
# runtime state and disables UI profile changes (403).
#
# On missing/malformed/invalid profile.json the system falls back to
# offline_private (safest default) and emits an audit alert.
# ---------------------------------------------------------------------------
profile:
  # Default profile for new installs (used when no profile.json exists)
  default: "offline_private"

  definitions:
    offline_private:
      description: "Maximum isolation — no network, core services only"
      mode: "local-only"
      session_mode: "offline-only"
      agent_mode: "offline_only"
      rationale: >
        Agent remains active in offline_only mode because it provides useful
        local automation (file management, workspace tasks) with no network
        access, hard budget limits, and loopback-only IPC.  The agent service
        unit uses PrivateNetwork=yes and the nftables rules block all egress.
        policy.yaml network.runtime_egress=deny cannot be overridden by agent
        mode.  This is verified by test_profile_system.py.
      services_enabled:
        # Tier 1: Security infrastructure (always on)
        - secure-ai-runtime-attestor.service
        - secure-ai-integrity-monitor.service
        - secure-ai-incident-recorder.service
        - secure-ai-policy-engine.service
        - secure-ai-boot-verify.service
        - secure-ai-vault-watchdog.service
        - secure-ai-health-check.service
        - secure-ai-gpu-integrity-watch.service
        - secure-ai-mcp-firewall.service
        # Tier 2: Core function
        - secure-ai-ui.service
        - secure-ai-registry.service
        - secure-ai-tool-firewall.service
        - secure-ai-agent.service
        - secure-ai-quarantine-watcher.service
        - secure-ai-inference.service
      services_disabled:
        - secure-ai-diffusion.service
        - secure-ai-enable-diffusion.path
        - secure-ai-airlock.service
        - secure-ai-tor.service
        - secure-ai-searxng.service
        - secure-ai-search-mediator.service

    research:
      description: "Privacy-preserving research — Tor-routed web search"
      mode: "online-augmented"
      session_mode: "normal"
      agent_mode: "online_assisted"
      rationale: >
        Enables the search stack (SearXNG + Tor + search-mediator) and the
        airlock for filtered outbound access.  All web traffic is Tor-routed
        with PII stripping and differential privacy (decoy queries).  Agent
        can use search-assisted tools but only through the airlock.
      services_enabled:
        # Everything from offline_private plus search/airlock stack
        - secure-ai-runtime-attestor.service
        - secure-ai-integrity-monitor.service
        - secure-ai-incident-recorder.service
        - secure-ai-policy-engine.service
        - secure-ai-boot-verify.service
        - secure-ai-vault-watchdog.service
        - secure-ai-health-check.service
        - secure-ai-gpu-integrity-watch.service
        - secure-ai-mcp-firewall.service
        - secure-ai-ui.service
        - secure-ai-registry.service
        - secure-ai-tool-firewall.service
        - secure-ai-agent.service
        - secure-ai-quarantine-watcher.service
        - secure-ai-inference.service
        - secure-ai-airlock.service
        - secure-ai-tor.service
        - secure-ai-searxng.service
        - secure-ai-search-mediator.service
      services_disabled:
        - secure-ai-diffusion.service
        - secure-ai-enable-diffusion.path

    full_lab:
      description: "Full capability lab — all services available"
      mode: "online-augmented"
      session_mode: "normal"
      agent_mode: "standard"
      rationale: >
        All services enabled including diffusion activation path unit and
        the full search/airlock stack.  Network traffic is filtered through
        the airlock (not direct).  Suitable for evaluation, research, and
        model testing where maximum capability is needed.
      services_enabled:
        # All services
        - secure-ai-runtime-attestor.service
        - secure-ai-integrity-monitor.service
        - secure-ai-incident-recorder.service
        - secure-ai-policy-engine.service
        - secure-ai-boot-verify.service
        - secure-ai-vault-watchdog.service
        - secure-ai-health-check.service
        - secure-ai-gpu-integrity-watch.service
        - secure-ai-mcp-firewall.service
        - secure-ai-ui.service
        - secure-ai-registry.service
        - secure-ai-tool-firewall.service
        - secure-ai-agent.service
        - secure-ai-quarantine-watcher.service
        - secure-ai-inference.service
        - secure-ai-airlock.service
        - secure-ai-tor.service
        - secure-ai-searxng.service
        - secure-ai-search-mediator.service
        - secure-ai-enable-diffusion.path
      services_disabled:
        # Diffusion worker itself stays disabled — activated on-demand via path unit
        - secure-ai-diffusion.service
