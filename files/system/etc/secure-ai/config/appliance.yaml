version: 1

appliance:
  name: "Secure AI Appliance"
  mode: "local-only"  # local-only | online-augmented

paths:
  vault: "/var/lib/secure-ai/vault"
  registry: "/var/lib/secure-ai/registry"
  quarantine: "/var/lib/secure-ai/quarantine"
  airlock_audit: "/var/lib/secure-ai/airlock-audit"
  tmpdir: "/run/secure-ai/tmp"
  outputs: "/var/lib/secure-ai/vault/outputs"

gpu:
  # Auto-detected at first boot by detect-gpu.sh. Override here if needed.
  # backend: auto | cuda | rocm | xpu | vulkan | mps | cpu
  backend: "auto"

vm:
  # VM-specific settings (auto-detected by detect-vm.sh at first boot)
  # gpu_passthrough: allow GPU acceleration in VMs (disabled by default for security)
  # When disabled, inference and diffusion run on CPU only — safer but slower.
  # When enabled, GPU memory is accessible to the host hypervisor.
  gpu_passthrough: false

inference:
  engine: "llama-cpp"
  bind: "127.0.0.1:8465"
  gpu_layers: -1  # -1 = offload all layers to GPU; 0 = CPU only
  context_size: 8192
  default_model: ""  # set after first model is promoted

diffusion:
  bind: "127.0.0.1:8455"
  max_resolution: 2048
  max_steps: 100
  max_frames: 120

services:
  registry:
    bind: "127.0.0.1:8470"
  tool_firewall:
    bind: "127.0.0.1:8475"
  ui:
    bind: "127.0.0.1:8480"
  airlock:
    bind: "127.0.0.1:8490"
  diffusion:
    bind: "127.0.0.1:8455"
  search_mediator:
    bind: "127.0.0.1:8485"
  searxng:
    bind: "127.0.0.1:8888"
  tor:
    socks: "127.0.0.1:9050"

session:
  mode: "normal"  # normal | sensitive | offline-only
  # sensitive mode: aggressive worker recycling after each task
  # offline-only: hard-block all network even if airlock is enabled

monitoring:
  # Model integrity check interval (minutes). The integrity timer verifies
  # SHA256 hashes of all promoted models against the registry manifest.
  # On mismatch: model is quarantined, removed from manifest, workers restarted.
  integrity_interval: 15  # minutes (5, 15, 30, or 60)

  # Audit log chain verification interval (minutes). Walks every hash-chained
  # audit log and verifies the chain is intact. On break: snapshots the broken
  # log and raises a CRITICAL alert.
  audit_interval: 30  # minutes

vault:
  # Auto-lock timeout in minutes. After this period of inactivity the vault
  # is automatically locked (unmounted + LUKS closed), stopping all AI services.
  # Set to 0 to disable auto-lock (not recommended).
  auto_lock_timeout: 30
  # How often the watchdog checks for inactivity (seconds).
  check_interval: 30

auth:
  # Session timeout in minutes. After this period of inactivity the user
  # must re-authenticate. Setting to 0 disables timeout (not recommended).
  session_timeout: 30
  # Maximum failed login attempts before lockout.
  max_failed_attempts: 5
  # Initial lockout duration in seconds after max_failed_attempts.
  lockout_duration: 60
  # Escalated lockout after 15 failed attempts (seconds).
  escalated_lockout: 900

secure_boot:
  # UEFI Secure Boot + TPM2 measured boot (M17).
  # MOK (Machine Owner Key) signs bootloader and kernel.
  # TPM2 seals the LUKS vault key to PCR values (firmware, kernel, bootloader,
  # secure boot state). If the boot chain is tampered, TPM refuses to unseal
  # and the user must enter the passphrase manually.
  # PCR binding: PCR 0 (firmware), 2 (option ROM), 4 (bootloader), 7 (SB state).
  tpm2_pcr_binding: "sha256:0,2,4,7"
  # Allow passphrase fallback when PCR mismatch (e.g., after legitimate update).
  passphrase_fallback: true
  # Auto-reseal after rpm-ostree upgrade (requires user passphrase confirmation).
  auto_reseal_on_update: false

sandbox:
  # Per-service process isolation (M16).
  # seccomp: JSON profiles in /etc/secure-ai/seccomp/ define allowed syscalls.
  # landlock: YAML policy in /etc/secure-ai/policy/landlock.yaml restricts filesystem access.
  # Both are enabled by default. If Landlock is unavailable (kernel < 5.13),
  # enforcement is skipped with a warning.
  seccomp_enabled: true
  landlock_enabled: true
  # Core dump prevention across all services (LimitCORE=0).
  core_dumps_disabled: true

logging:
  level: "info"
  store_raw_prompts: false
  store_raw_responses: false
  audit_tool_calls: true
