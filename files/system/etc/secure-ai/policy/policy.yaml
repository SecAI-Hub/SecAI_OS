version: 1

defaults:
  network:
    runtime_egress: "deny"
  logging:
    store_raw_prompts: false
    store_raw_responses: false

models:
  allowed_formats: ["gguf", "safetensors"]
  deny_formats: ["pickle", "pt", "bin"]
  require_scan: true
  require_behavior_tests: true
  require_source_verification: true
  require_entropy_analysis: true
  # Diffusion models: directories with model_index.json + safetensors components
  allow_diffusion_directories: true

quarantine:
  # Pipeline stages (all enabled by default for maximum security)
  stages:
    source_policy: true       # Stage 1: verify origin against allowlist
    format_gate: true         # Stage 2: validate headers + reject unsafe formats
    integrity_check: true     # Stage 3: hash pinning verification
    provenance_check: true    # Stage 4: cosign / signature verification
    static_scan: true         # Stage 5: modelscan + entropy + gguf-guard
    behavioral_test: true     # Stage 6: adversarial prompt suite (LLM only)
    diffusion_deep_scan: true # Stage 7: config integrity (diffusion only)
  # Smoke test threshold: fail if >30% prompts flagged OR >1 critical flag
  smoke_test_max_score: 0.3
  smoke_test_max_critical: 1

# gguf-guard: GGUF model integrity and anomaly scanner
# Provides deep weight-level analysis beyond modelscan/fickling:
#   - Layered anomaly scoring (per-tensor, cross-layer, model-global, reference)
#   - Quant-format-aware block analysis (scale entropy, repeated blocks)
#   - Per-tensor SHA-256 integrity manifests with Merkle tree
#   - Structural policy validation and model family identification
gguf_guard:
  # Whether gguf-guard is required (fail-closed if not installed)
  required: false
  # Generate per-tensor integrity manifest on promotion
  generate_manifest: true
  # Generate structural fingerprint on promotion
  generate_fingerprint: true
  # Verify manifest on periodic integrity checks (complements fs-verity)
  verify_on_integrity_check: true

tools:
  default: "deny"
  rate_limit:
    requests_per_minute: 120
    burst_size: 20
  allow:
    - name: "filesystem.read"
      paths_allowlist:
        - "/vault/user_docs/**"
      paths_denylist:
        - "/etc/shadow"
        - "/etc/passwd"
        - "/etc/secure-ai/**"
      max_arg_length: 4096
    - name: "filesystem.write"
      paths_allowlist:
        - "/vault/outputs/**"
      paths_denylist:
        - "/vault/outputs/../**"
      args_blocklist:
        - "../"
        - "/etc/"
        - "/usr/"
      max_arg_length: 4096
    - name: "filesystem.list"
      paths_allowlist:
        - "/vault/user_docs/**"
        - "/vault/outputs/**"
  deny:
    - name: "shell.exec"
    - name: "network.fetch"
    - name: "process.spawn"
    - name: "filesystem.delete"

search:
  # Tor-routed web search via self-hosted SearXNG
  # Disabled by default — user must explicitly enable
  enabled: false
  # Maximum query length sent to SearXNG (after PII stripping)
  max_query_length: 200
  # Maximum results returned per search
  max_results: 5
  # Maximum context size injected into LLM (characters)
  max_context_length: 4000
  # PII scanning on outbound queries (always on)
  strip_pii: true
  # Block queries that are >50% redacted PII
  block_high_pii_queries: true
  # Injection detection on inbound results
  detect_injection: true
  # Audit every search (query hash + length + redaction count + result count)
  audit: true
  # Search engines enabled in SearXNG (privacy-respecting only)
  allowed_engines:
    - duckduckgo
    - wikipedia
    - stackoverflow
    - github
  # Differential privacy for search queries (M20)
  differential_privacy:
    enabled: true
    # Number of decoy searches per real search (0 to disable)
    decoy_count: 2
    # How to handle highly unique/identifying queries:
    #   auto-block: silently block the query
    #   warn: return a warning but still execute
    #   allow: no check
    uniqueness_mode: "warn"
    # Batch timing window (seconds) — queries within this window are grouped
    batch_window: 5.0

airlock:
  enabled: false
  allowed_destinations:
    - "https://huggingface.co/"
    - "https://registry.ollama.ai/"
    - "https://cdn-lfs.huggingface.co/"
    - "https://cdn-lfs-us-1.huggingface.co/"
  allowed_methods: ["GET", "POST"]
  max_body_size: 10485760  # 10 MB
  rate_limit:
    requests_per_minute: 30
  content_rules:
    block_if_contains: []
    scan_for_pii: true
    scan_for_credentials: true
