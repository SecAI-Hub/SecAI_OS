# Keystore configuration (M41 — HSM-Backed Key Handling)
#
# Controls which key management backend is used for signing,
# verification, and key derivation across all SecAI services.
#
# Backend selection:
#   auto     — try TPM2 first, fall back to software (default)
#   software — always use filesystem-stored keys
#   tpm2     — require TPM2 hardware (fail if unavailable)
#   pkcs11   — require external HSM via PKCS#11

version: 1
backend: auto

# Software backend (filesystem-stored keys)
software:
  key_dir: /run/secure-ai
  default_key_path: /run/secure-ai/token-secret

# TPM2 backend (PCR-sealed keys)
tpm2:
  key_dir: /var/lib/secure-ai/keys/tpm2
  pcr_list: "sha256:0,2,4,7"

# PKCS#11 backend (external HSM — requires python3-pkcs11)
# Uncomment and configure when HSM hardware is available.
# pkcs11:
#   module_path: /usr/lib64/pkcs11/opensc-pkcs11.so
#   slot_id: 0
#   pin: ""   # set via PKCS11_PIN env var in production

# Key rotation policy
rotation:
  enabled: false
  interval_hours: 720    # 30 days
  on_boot: false         # rotate keys on every boot

# Audit settings
audit:
  log_path: /var/lib/secure-ai/logs/keystore-audit.jsonl
  log_operations: true   # log sign/verify/rotate operations
