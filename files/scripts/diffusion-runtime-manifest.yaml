# Diffusion runtime trust anchor.
#
# This manifest defines the per-backend wheel sets needed by the diffusion
# runtime installer (secai-enable-diffusion.sh).  It is the sole trust anchor
# for the on-demand acquisition flow.
#
# Two-file trust model per backend:
#   1. Lockfile  (diffusion-<backend>.lock)   -- pip-compile --generate-hashes
#      Used at install time: pip install --no-index --require-hashes
#   2. Wheel manifest (the "wheels" list below)
#      Used at download time: exact filename + SHA256 before promotion.
#
# STATUS: UNPOPULATED
#   The wheel lists and lockfiles below are structural scaffolding only.
#   They contain no real hashes and CANNOT be used to install the runtime.
#   To populate with real data, run on a Linux machine with the target Python:
#
#     scripts/refresh-diffusion-locks.sh
#
#   This will pip-compile backend-specific lockfiles and fill in the wheel
#   entries with real filenames, SHA256 hashes, and source URLs.
#
#   The installer (secai-enable-diffusion.sh) checks the 'populated' flag
#   below and refuses to run if it is false.

schema_version: 1
description: "Diffusion runtime trust anchor — per-backend wheel manifests and lockfiles"

# Set to true by scripts/refresh-diffusion-locks.sh after populating real hashes.
# The installer refuses to run while this is false.
populated: false

python_version: "3.12"
supported_architectures:
  - x86_64

# ---------------------------------------------------------------------------
# Allowed download sources (checked against both initial and final URLs)
# ---------------------------------------------------------------------------
allowed_sources:
  - "https://download.pytorch.org/whl/*"
  - "https://files.pythonhosted.org/packages/*"

format_policy: wheel_only   # reject sdists / tarballs / eggs

# ---------------------------------------------------------------------------
# Backend definitions
#
# Each backend needs:
#   lockfile: pip-compile output with --generate-hashes
#   torch_index: PyTorch wheel index URL for this backend
#   estimated_size_mb: approximate download size for the UI consent dialog
#   wheels: list of {filename, sha256, source} — the download-phase trust anchor
#
# The wheels lists below are EMPTY until populated by refresh-diffusion-locks.sh.
# ---------------------------------------------------------------------------
backends:
  cpu:
    lockfile: diffusion-cpu.lock
    torch_index: https://download.pytorch.org/whl/cpu
    estimated_size_mb: 2000
    wheels: []
    # Populated by: scripts/refresh-diffusion-locks.sh --backend cpu

  cuda:
    lockfile: diffusion-cuda.lock
    torch_index: https://download.pytorch.org/whl/cu121
    estimated_size_mb: 4500
    wheels: []
    # Populated by: scripts/refresh-diffusion-locks.sh --backend cuda

  rocm:
    lockfile: diffusion-rocm.lock
    torch_index: https://download.pytorch.org/whl/rocm6.0
    estimated_size_mb: 4000
    wheels: []
    # Populated by: scripts/refresh-diffusion-locks.sh --backend rocm
