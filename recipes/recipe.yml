--- # yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: secai_os
description: "Offline-first Secure AI appliance (uBlue base) with sealed runtime and defense-in-depth."

# SECURITY: Base image should be digest-pinned in production.
# Run: skopeo inspect docker://ghcr.io/ublue-os/silverblue-main:42 | jq -r '.Digest'
# Then set: image-version: "42@sha256:<digest>"
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 42

modules:
  # 1) Install required packages (includes GPU compute libraries).
  - type: rpm-ostree
    install:
      - nftables
      - cryptsetup
      - cosign
      - jq
      - python3
      - python3-pip
      - python3-pyyaml
      - python3-flask
      - python3-requests
      - python3-gunicorn       # Production WSGI server (replaces Flask dev server)
      - golang
      # GPU compute support
      - mesa-dri-drivers          # Intel/AMD OpenGL + Vulkan
      - mesa-vulkan-drivers       # Vulkan for Intel/AMD
      - vulkan-loader             # Vulkan ICD loader
      - vulkan-tools              # vulkaninfo for diagnostics
      - libdrm                    # DRM library (all GPUs)
      - clinfo                    # OpenCL diagnostics
      # Model download tools
      - git                           # Git for HuggingFace model cloning
      # Clipboard auto-clear (M21)
      - wl-clipboard                  # wl-copy/wl-paste for Wayland clipboard clearing
      # Tor (anonymous web search — SearXNG installed via pip in build-services.sh)
      - tor                         # Tor SOCKS5 proxy
      # Model integrity (M27)
      - fsverity-utils                    # fs-verity Merkle tree integrity on model files
      # Canary / tripwire inotify watcher (M22)
      - inotify-tools                   # inotifywait for real-time file monitoring
      # Secure Boot + TPM2 (M17)
      - mokutil                       # MOK enrollment
      - sbsigntools                   # EFI binary signing
      - tpm2-tools                    # TPM2 key sealing/unsealing
      - tpm2-tss                      # TPM2 Software Stack
      # Update verification + auto-rollback (M24)
      - greenboot                         # Health-check-based auto-rollback

  # 2) Copy appliance config, systemd units, firewall rules, sysctl into image.
  - type: files
    files:
      - source: system
        destination: /

  # 3) Make service source available to build script, then compile.
  #    BlueBuild mounts files/ at /tmp/files/ but services/ is at repo root.
  #    The containerfile snippet copies services/ into the image for the build.
  - type: containerfile
    snippets:
      - COPY services/ /tmp/services/

  - type: script
    scripts:
      - build-services.sh

  # 4) NVIDIA kernel modules (nvidia-open for RTX 5080+).
  #    AMD and Intel use in-kernel drivers (amdgpu, i915/xe) — no akmods needed.
  - type: akmods
    base: main
    install: []
    nvidia-driver: nvidia-open

  # 5) Kernel args: GPU setup + disable swap + security hardening.
  - type: kargs
    kargs:
      # NVIDIA
      - rd.driver.blacklist=nouveau
      - modprobe.blacklist=nouveau
      - nvidia-drm.modeset=1
      # AMD — amdgpu is in-kernel, just ensure it's preferred
      - amdgpu.dc=1
      # Security hardening
      - systemd.swap=0
      - slab_nomerge
      - init_on_alloc=1
      - init_on_free=1
      - page_alloc.shuffle=1
      - randomize_kstack_offset=on
      - vsyscall=none
      # Memory protection (M18) — disable compressed swap
      - zswap.enabled=0
      - lockdown=confidentiality
      - iommu=force

  # 6) Enable/disable systemd units baked into the image.
  - type: systemd
    system:
      enabled:
        - secure-ai-runtime-attestor.service
        - secure-ai-integrity-monitor.service
        - secure-ai-incident-recorder.service
        - secure-ai-policy-engine.service
        - secure-ai-registry.service
        - secure-ai-tool-firewall.service
        - secure-ai-agent.service
        - secure-ai-ui.service
        - secure-ai-quarantine-watcher.service
        - secure-ai-inference.service
        - secure-ai-integrity.timer
        - secure-ai-audit-verify.timer
        - secure-ai-vault-watchdog.service
        - secure-ai-boot-verify.service
        - secure-ai-dns-leak-check.timer
        - secure-ai-clipboard-clear.timer
        - secure-ai-canary.timer
        - secure-ai-canary-watch.service
        - secure-ai-update-check.timer
        - secure-ai-health-check.service
        - secure-ai-gpu-integrity-watch.service
        - secure-ai-mcp-firewall.service
        - greenboot-healthcheck.service
        - greenboot-task-runner.service
        - nftables.service
        - secure-ai-firstboot.service
        - secure-ai-tmpdir.mount
        # Path unit watches for UI-triggered diffusion install request
        - secure-ai-enable-diffusion.path
      disabled:
        # Diffusion requires torch/diffusers — opt-in via UI or secai-enable-diffusion.sh
        - secure-ai-diffusion.service
        - secure-ai-airlock.service
        # Search stack disabled by default (user enables via policy)
        - secure-ai-tor.service
        - secure-ai-searxng.service
        - secure-ai-search-mediator.service

  # 7) Install signing policy for cosign-verified images.
  - type: signing
